<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Consulta de Certificados</title>

<style>

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:60px;
}

.search-box{

    width:380px;
    background:#fff;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    padding:25px;

}

input,button{

    width:100%;
    box-sizing:border-box;
    padding:10px;
    margin-top:10px;
    border-radius:5px;
    border:1px solid #ccc;

}

button{

    cursor:pointer;

}

.buscar{

    background:#1a73e8;
    color:white;

}

.info{

    background:#34a853;
    color:white;
    display:none;

}

#resultado{

    margin-top:15px;
    padding:10px;
    border-radius:5px;
    background:#efefef;
    display:none;

}

#login{

    display:none;
    margin-top:15px;

}

</style>

</head>

<body>

<div class="search-box">

<h2>Consulta de Mantenimiento</h2>

<input
id="codigo"
placeholder="Ingrese código">

<button
class="buscar"
onclick="buscarPublico()">

Buscar

</button>

<div id="resultado"></div>

<button
id="btnInfo"
class="info"
onclick="mostrarLogin()">

Más información

</button>

<div id="login">

<input
id="user"
placeholder="Usuario">

<input
id="pass"
type="password"
placeholder="Contraseña">

<button onclick="buscarPrivado()">

Ingresar

</button>

</div>

</div>

<script>

const URL="https://script.google.com/macros/s/AKfycbzL0vWwIODt0JRyZIdqBFAmXR50w8AVztY8dn2negkQotHog-IyKpITm5ophOGduOwQkg/exec";

async function buscarPublico(){

const codigo=document.getElementById("codigo").value.trim();

try{

const r=await fetch(URL+"?accion=buscar&codigo="+encodeURIComponent(codigo),{

method:"GET",
redirect:"follow",
cache:"no-cache"

});

const data=await r.json();

console.log(data);

if(data.encontrado){

document.getElementById("resultado").style.display="block";

document.getElementById("resultado").innerHTML=`
<b>Cliente:</b> ${data.cliente}<br>
<b>Equipo:</b> ${data.equipo_intervenido}<br>
<b>Fecha:</b> ${data.fecha_mnto}<br>
<b>Próximo:</b> ${data.fecha_p_mnto}
`;

document.getElementById("btnInfo").style.display="block";

}else{

alert(data.error);

}

}catch(e){

console.error(e);
alert(e);

}

}

function mostrarLogin(){

document.getElementById("login").style.display="block";

}

async function buscarPrivado(){

const codigo=document.getElementById("codigo").value.trim();

const user=document.getElementById("user").value;

const pass=document.getElementById("pass").value;

try{

const r=await fetch(URL+

"?accion=info"+
"&codigo="+encodeURIComponent(codigo)+
"&user="+encodeURIComponent(user)+
"&pass="+encodeURIComponent(pass),

{

method:"GET",
redirect:"follow",
cache:"no-cache"

});

const data=await r.json();

console.log(data);

if(data.encontrado){

alert(data.info_privada);

}else{

alert(data.error);

}

}catch(e){

console.error(e);
alert(e);

}

}

</script>

</body>
</html>
