<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Consulta Certificados SELECOBA
</title>


<link rel="stylesheet" href="consulta.css">


</head>



<body>



<div class="container">



<div class="logo">

<img src="../logo.png">

</div>



<div class="card">



<h2>

Consulta de Mantenimiento

</h2>




<input

id="codigo"

placeholder="Ingrese código del certificado"

autocomplete="off"



>



<button

class="buscar"

onclick="buscarCertificado()"

>

🔍 Buscar

</button>




<div

id="spinner"

class="spinner"

>

🔄 Consultando certificado...

</div>




<div

id="resultado"

>

</div>





<button

id="btnInfo"

class="info"

onclick="mostrarLogin()"

>

🔐 Ver información técnica

</button>






<div

id="login"

class="login"

>



<h3>

Acceso técnico

</h3>



<input

id="usuario"

placeholder="Usuario"

>



<input

id="password"

type="password"

placeholder="Contraseña"

>




<button

class="buscar"

onclick="validarAcceso()"

>

Ingresar

</button>



</div>




</div>




<a

href="../index.html"

class="volver"

>

← Volver al inicio

</a>




</div>



<script src="consulta.js"></script>


</body>


</html>
